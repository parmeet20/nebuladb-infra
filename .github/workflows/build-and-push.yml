name: Build & Push Native Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME_PREFIX: ${{ github.repository_owner }}

jobs:
  build-native:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: nebula-auth
            context: service-infra/nebula-auth
            port: 8002

          - service: project-service
            context: service-infra/project-service
            port: 8000

          - service: docker-infra-service
            context: service-infra/docker-infra-service
            port: 8001

          - service: eureka-server
            context: cloud/eureka-server
            port: 8761

          - service: api-gateway
            context: cloud/api-gateway
            port: 8888

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          pwd
          echo "================ Repository ================"
          find . -maxdepth 3 -type f | sort

      - name: Verify Dockerfile.native
        run: |
          echo "Context: ${{ matrix.context }}"
          ls -la "${{ matrix.context }}"
          test -f "${{ matrix.context }}/Dockerfile.native"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Native Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ github.workspace }}/${{ matrix.context }}/Dockerfile.native
          push: true
          tags: |
            docker.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max