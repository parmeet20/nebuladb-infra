# .github/workflows/build-and-push.yml
name: Build & Push Native Images

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME_PREFIX: ${{ github.repository_owner }}
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  build-native:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: nebula-auth
            module_parent: service-infra
            module_name: nebula-auth
            artifact_name: nebula-auth-service
            port: 8002
          - service: project-service
            module_parent: service-infra
            module_name: project-service
            artifact_name: project-service
            port: 8000
          - service: docker-infra-service
            module_parent: service-infra
            module_name: docker-infra-service
            artifact_name: docker-infra-service
            port: 8001
          - service: eureka-server
            module_parent: cloud
            module_name: eureka-server
            artifact_name: eureka-server
            port: 8761
          - service: api-gateway
            module_parent: cloud
            module_name: api-gateway
            artifact_name: api-gateway
            port: 8888

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Verify Dockerfile.native
        run: |
          ls -la
          test -f Dockerfile.native

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push native image
        uses: docker/build-push-action@v5.4.0
        with:
          context: .
          file: ./Dockerfile.native
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MODULE_PARENT=${{ matrix.module_parent }}
            MODULE_NAME=${{ matrix.module_name }}
            ARTIFACT_NAME=${{ matrix.artifact_name }}
            MAVEN_OPTS=-Dmaven.repo.local=/root/.m2/repository