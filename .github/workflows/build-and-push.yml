# .github/workflows/build-and-push.yml
name: Build & Push Native Images

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME_PREFIX: ${{ github.repository_owner }}
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  build-native:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: nebula-auth
            context: service-infra/nebula-auth
            dockerfile: Dockerfile.native
            port: 8002
          - service: project-service
            context: service-infra/project-service
            dockerfile: Dockerfile.native
            port: 8000
          - service: docker-infra-service
            context: service-infra/docker-infra-service
            dockerfile: Dockerfile.native
            port: 8001
          - service: eureka-server
            context: cloud/eureka-server
            dockerfile: Dockerfile.native
            port: 8761
          - service: api-gateway
            context: cloud/api-gateway
            dockerfile: Dockerfile.native
            port: 8888

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Show Dockerfile.native in context
        run: |
          echo "=== Listing ${{ matrix.context }} ==="
          ls -la ${{ matrix.context }}/
          echo "=== Dockerfile.native content (first 5 lines) ==="
          head -n 5 ${{ matrix.context }}/${{ matrix.dockerfile }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push native image
        uses: docker/build-push-action@v5.4.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MAVEN_OPTS=-Dmaven.repo.local=/root/.m2/repository