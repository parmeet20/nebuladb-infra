spring:
  application:
    name: ${SPRING_APPLICATION_NAME:project-service}

  # GraalVM native image: disable features incompatible with AOT code generation
  cloud:
    refresh:
      enabled: false
    compatibility-verifier:
      enabled: false
  main:
    cloud-platform: none

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:nebuladb}?createDatabaseIfNotExist=${MYSQL_CREATE_DB:true}&useSSL=${MYSQL_USE_SSL:false}&allowPublicKeyRetrieval=${MYSQL_ALLOW_PUBLIC_KEY:true}&serverTimezone=${MYSQL_TIMEZONE:UTC}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      pool-name: ${HIKARI_POOL_NAME:project-service-pool}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        generate_statistics: ${JPA_GENERATE_STATS:false}
        jdbc:
          time_zone: ${MYSQL_TIMEZONE:UTC}

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: ${KAFKA_PRODUCER_ACKS:all}
      retries: ${KAFKA_PRODUCER_RETRIES:3}
      properties:
        enable.idempotence: ${KAFKA_IDEMPOTENCE:true}
        delivery.timeout.ms: ${KAFKA_DELIVERY_TIMEOUT:120000}
        request.timeout.ms: ${KAFKA_REQUEST_TIMEOUT:30000}
        max.in.flight.requests.per.connection: ${KAFKA_MAX_IN_FLIGHT:5}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:project-service}
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:earliest}
      enable-auto-commit: ${KAFKA_AUTO_COMMIT:false}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: ${KAFKA_TRUSTED_PACKAGES:io.dev.events}
        spring.json.use.type.headers: ${KAFKA_USE_TYPE_HEADERS:false}
        spring.json.value.default.type: ${KAFKA_DEFAULT_TYPE:io.dev.events.EventCreatedResourceV1}
    listener:
      ack-mode: ${KAFKA_LISTENER_ACK_MODE:record}
      missing-topics-fatal: ${KAFKA_MISSING_TOPICS_FATAL:false}

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:${HOSTNAME:localhost}}
    prefer-ip-address: ${EUREKA_PREFER_IP:true}
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    lease-renewal-interval-in-seconds: ${EUREKA_LEASE_RENEWAL:30}
    lease-expiration-duration-in-seconds: ${EUREKA_LEASE_EXPIRATION:90}
  client:
    register-with-eureka: ${EUREKA_REGISTER:true}
    fetch-registry: ${EUREKA_FETCH:true}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://${EUREKA_HOSTNAME:localhost}:${EUREKA_PORT:8761}/eureka/}
    registry-fetch-interval-seconds: ${EUREKA_FETCH_INTERVAL:30}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health,info,prometheus}
      base-path: ${MANAGEMENT_BASE_PATH:/actuator}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_DETAILS:always}
      probes:
        enabled: ${MANAGEMENT_PROBES_ENABLED:true}
  health:
    db:
      enabled: true
    defaults:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: ${PROMETHEUS_ENABLED:true}

server:
  port: ${SERVER_PORT:8000}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/}
  compression:
    enabled: ${SERVER_COMPRESSION:true}
    mime-types: ${SERVER_COMPRESSION_MIME_TYPES:application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    io.dev.project_service: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.kafka: ${LOG_LEVEL_KAFKA:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
  pattern:
    console: ${LOG_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss} - %msg%n}
    file: ${LOG_PATTERN_FILE:%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n}
  file:
    name: ${LOG_FILE:/logs/${spring.application.name}.log}